name: Waynode
options:
  bundleIdPrefix: com.waynode
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  WaynodeCore:
    path: WaynodeCore

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Waynode:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
    dependencies:
      - package: WaynodeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waynode.app
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
