name: Waynode
options:
  bundleIdPrefix: com.waynode
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  WaynodeCore:
    path: WaynodeCore
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.14.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "2V6YSU4HFB"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  Waynode:
    build:
      targets:
        Waynode: all
  WaynodeUITests:
    build:
      targets:
        Waynode: all
        WaynodeUITests: [test]
    test:
      targets:
        - WaynodeUITests
      gatherCoverageData: false

targets:
  Waynode:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
    dependencies:
      - package: WaynodeCore
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waynode.app
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        # One universal target: iPhone, iPad, and Mac share the same bundle
        # identifier, signing team, StoreKit products, and SwiftUI code.
        SUPPORTS_MACCATALYST: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO

  WaynodeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: WaynodeUITests
    dependencies:
      - target: Waynode
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waynode.app.uitests
        TEST_TARGET_NAME: Waynode
        SUPPORTS_MACCATALYST: YES
        GENERATE_INFOPLIST_FILE: YES
