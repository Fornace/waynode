# docker-compose.ffrapposerver.yml — STANDALONE compose for the sandbox host.
#
# waynode runs HERE (on ffrapposerver, the bare-metal KVM box) so tenant agent
# code executes inside hardware-isolated microVMs. The LLM is reached over the
# WireGuard tunnel to 49.12.9.255 (10.200.0.1:4000), NOT a shared docker network.
#
# LLM_BASE_URL/LLM_API_KEY are supplied at container RUNTIME via .env (see
# lib/pi-config.mjs) — NOT as a Docker build arg. The main waynode image's
# egress isn't network-scoped the way sandbox/Dockerfile's is, so the key
# must never be baked into an image layer here.
#
# Usage on ffrapposerver: set LLM_BASE_URL=10.200.0.1:4000 and LLM_API_KEY=...
# in .env, then:
#   docker compose -f docker-compose.ffrapposerver.yml up -d --build
services:
  waynode:
    build:
      context: .
    container_name: waynode
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    ports:
      # nginx terminates TLS on this same host. Never publish the app's plain
      # HTTP origin on every interface.
      - "${WAYNODE_BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - PORT=3000
      - WAYNODE_REVISION=${WAYNODE_REVISION:-development}
    env_file:
      - .env
    devices:
      - /dev/kvm        # hardware virtualization — required to boot microVMs
      - /dev/net/tun    # microsandbox guest networking
    cap_add:
      - NET_ADMIN       # microsandbox guest networking setup
    volumes:
      - waynode-data:/data
      - /root/.microsandbox:/root/.microsandbox   # cached waynode-sandbox image
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  waynode-data:
