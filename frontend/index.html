<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / mobile web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Waynode" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicons -->
    <link rel="icon" href="/brand/waynode-mark.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/brand/waynode-mark.svg" color="#3b82f6" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Social / share -->
    <title>Waynode — Open-source, self-hosted coding-agent workspace</title>
    <meta name="description" content="Waynode gives coding agents a persistent Git workspace: real cloned repos, agent-native diffs and push, desktop to mobile. Self-host free (MIT) or use Waynode Cloud." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Waynode — Open-source, self-hosted coding-agent workspace" />
    <meta property="og:description" content="A persistent Git workspace for coding agents: real cloned repos, agent-native diffs and push, desktop to mobile." />

    <!-- Agent-readable twins of this site: /index.md, /llms.txt, /llms-full.txt -->
    <link rel="alternate" type="text/markdown" title="Markdown version for LLMs" href="/index.md" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Waynode",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web, macOS, iOS",
      "url": "https://waynode.fornace.net",
      "sameAs": ["https://github.com/fornace/waynode"],
      "description": "Open-source, self-hosted coding-agent workspace. Each workspace is a real cloned Git repository with a persistent worktree, terminal, and agent session, reachable from desktop and mobile.",
      "license": "https://opensource.org/licenses/MIT",
      "offers": [
        { "@type": "Offer", "name": "Self-hosted", "price": "0", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Starter", "price": "39", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Pro", "price": "99", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Team", "price": "249", "priceCurrency": "USD" }
      ]
    }
    </script>
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Waynode AI" />
    <meta name="twitter:image" content="/og-image.png" />

    <style>
      /* ── Boot screen: no white flash; branded loader until React mounts ── */
      html, body { height: 100%; margin: 0; background: #0a0a0a; }
      #boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px; background: #0a0a0a; color: #888;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        z-index: 9999;
      }
      #boot-mark { width: 56px; height: 56px; animation: boot-pulse 1.6s ease-in-out infinite; }
      #boot-mark .hub { transform-origin: center; animation: boot-tension 4.8s ease-in-out infinite; }
      #boot-mark .nodes circle { transform-box: fill-box; transform-origin: center; animation: boot-node-tension 4.8s ease-in-out infinite; }
      #boot-mark .nodes circle:nth-child(2n) { animation-delay: -2.4s; }
      #boot-label { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #555; }
      @keyframes boot-pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
      @keyframes boot-tension { 0%,100% { opacity: .84; transform: scale(.985); } 50% { opacity: 1; transform: scale(1.015); } }
      @keyframes boot-node-tension { 0%,100% { transform: translateY(0) scale(.96); } 50% { transform: translateY(-.65px) scale(1.04); } }
      @media (prefers-reduced-motion: reduce) { #boot-mark .hub, #boot-mark .nodes circle { animation: none; } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Branded boot screen (removed once React mounts) -->
    <div id="boot">
      <svg id="boot-mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <g class="hub" fill="none" stroke="#60a5fa" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 23 24 50 32 15 45 50 55 11" stroke-width="4"/>
          <path d="m11 23 12 7 9-15 13 12 10-16" stroke-width="3.2" opacity=".8"/>
          <path d="m24 50 8-13 13 13" stroke-width="3.2" opacity=".82"/>
        </g>
        <g class="nodes" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5">
          <circle cx="11" cy="23" r="4"/><circle cx="23" cy="30" r="4"/>
          <circle cx="32" cy="15" r="4.5"/><circle cx="45" cy="27" r="4"/>
          <circle cx="55" cy="11" r="4.5"/><circle cx="24" cy="50" r="4.5"/>
          <circle cx="32" cy="37" r="4.5"/><circle cx="45" cy="50" r="4.5"/>
        </g>
      </svg>
      <div id="boot-label">Waynode</div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
