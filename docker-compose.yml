services:
  waynode:
    build: .
    container_name: waynode
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - waynode-data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
    networks:
      - default
      - fornace-net

networks:
  fornace-net:
    external: true
    name: fornace-llm_default

volumes:
  waynode-data:
